  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    // localStorage wrapper matching the original storage API
    window.storage = {
      get: async (key) => {
        try {
          const v = localStorage.getItem(key);
          return v !== null ? { value: v } : null;
        } catch (e) { return null; }
      },
      set: async (key, value) => {
        try { localStorage.setItem(key, value); return { value }; }
        catch (e) { return null; }
      },
    };

    // Inline lucide SVG icons
    const svgProps = (size) => ({
      xmlns: "http://www.w3.org/2000/svg",
      width: size, height: size,
      viewBox: "0 0 24 24",
      fill: "none", stroke: "currentColor",
      strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
    });
    const Play = ({ size = 16, fill = "none", className = "" }) => (
      <svg {...svgProps(size)} fill={fill} className={className}>
        <polygon points="6 3 20 12 6 21 6 3" />
      </svg>
    );
    const Pause = ({ size = 16, fill = "none" }) => (
      <svg {...svgProps(size)} fill={fill}>
        <rect x="6" y="4" width="4" height="16" />
        <rect x="14" y="4" width="4" height="16" />

    );
    const SkipForward = ({ size = 16, fill = "none" }) => (
      <svg {...svgProps(size)} fill={fill}>
        <polygon points="5 4 15 12 5 20 5 4" />

      </svg>
    );
    const Volume2 = ({ size = 16 }) => (
      <svg {...svgProps(size)}>
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
      </svg>
    );
    const VolumeX = ({ size = 16 }) => (
      <svg {...svgProps(size)}>
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
        <line x1="23" y1="9" x2="17" y2="15" />
        <line x1="17" y1="9" x2="23" y2="15" />
      </svg>
    );
    const List = ({ size = 16 }) => (
      <svg {...svgProps(size)}>
        <line x1="8" y1="6" x2="21" y2="6" />
        <line x1="8" y1="12" x2="21" y2="12" />
        <line x1="8" y1="18" x2="21" y2="18" />
        <line x1="3" y1="6" x2="3.01" y2="6" />
        <line x1="3" y1="12" x2="3.01" y2="12" />
        <line x1="3" y1="18" x2="3.01" y2="18" />
      </svg>
    );
    const Timer = ({ size = 16 }) => (
      <svg {...svgProps(size)}>
        <line x1="10" y1="2" x2="14" y2="2" />
        <line x1="12" y1="14" x2="15" y2="11" />
        <circle cx="12" cy="14" r="8" />
      </svg>
    );
    const Settings = ({ size = 16 }) => (
      <svg {...svgProps(size)}>
        <circle cx="12" cy="12" r="3" />
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
      </svg>
    );

    const SAGE = '#8FA987';
    const SAGE_SOFT = 'rgba(143, 169, 135, 0.15)';
    const STONE_800 = '#292524';

    const PRESETS = {
      '25/5/10': { focus: 25, shortBreak: 5, longBreak: 10, label: '25 / 5 / 10' },
      '50/10/15': { focus: 50, shortBreak: 10, longBreak: 15, label: '50 / 10 / 15' },
    };

    const BLOCK_LABELS = {
      focus: 'Focus',
      short_break: 'Break',
      long_break: 'Long break',
    };

    const CHIME_SOUNDS = [
      { id: 'chime-soft',   label: 'Soft chime',   path: './sounds/chime-soft.wav' },
      { id: 'kalimba',      label: 'Kalimba',      path: './sounds/kalimba.wav' },
      { id: 'wood-block',   label: 'Wood block',   path: './sounds/wood-block.wav' },
      { id: 'singing-bowl', label: 'Singing bowl', path: './sounds/singing-bowl.wav' },
    ];
    const TICK_SOUNDS = [
      { id: 'tick-wood',  label: 'Wood metronome', path: './sounds/tick-wood.wav' },
      { id: 'tick-clock', label: 'Clock tick',     path: './sounds/tick-clock.wav' },
      { id: 'tick-soft',  label: 'Soft click',     path: './sounds/tick-soft.wav' },
    ];
    const DEFAULT_SOUND_PREFS = {
      shortBreakStart: 'chime-soft',
      shortBreakEnd:   'chime-soft',
      longBreakStart:  'singing-bowl',
      longBreakEnd:    'chime-soft',
      tickSound:       'tick-wood',
      tickingEnabled:  false,
      spotifyPlaylistUri: 'spotify:playlist:37i9dQZF1DWWQRwui0ExPn',
    };

    // ─── Spotify integration ────────────────────────────────
    const SPOTIFY_CLIENT_ID = '8fcb91adb2a54a12ac7fad19eece5a2b';
    const SPOTIFY_REDIRECT_URI = window.location.origin + '/focustracker/';
    const SPOTIFY_SCOPES = [
      'streaming',
      'user-read-email',
      'user-read-private',
      'playlist-read-private',
      'playlist-read-collaborative',
      'user-modify-playback-state',
      'user-read-playback-state',
    ].join(' ');
    const SPOTIFY_DEFAULT_PLAYLIST = {
      uri: 'spotify:playlist:37i9dQZF1DWWQRwui0ExPn',
      name: 'Lofi Beats (Spotify, may not play)',
    };

    function b64url(buf) {
      let s = '';
      const arr = new Uint8Array(buf);
      for (let i = 0; i < arr.length; i++) s += String.fromCharCode(arr[i]);
      return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }
    async function pkceChallenge(verifier) {
      return b64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)));
    }
    function randStr(len = 64) {
      const arr = new Uint8Array(len);
      crypto.getRandomValues(arr);
      return b64url(arr.buffer).slice(0, len);
    }

    async function spotifyBeginAuth() {
      const verifier = randStr(64);
      const challenge = await pkceChallenge(verifier);
      const state = randStr(16);
      sessionStorage.setItem('spotify_pkce_verifier', verifier);
      sessionStorage.setItem('spotify_pkce_state', state);
      const params = new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        response_type: 'code',
        redirect_uri: SPOTIFY_REDIRECT_URI,
        code_challenge_method: 'S256',
        code_challenge: challenge,
        state,
        scope: SPOTIFY_SCOPES,
      });
      window.location.href = 'https://accounts.spotify.com/authorize?' + params.toString();
    }

    async function spotifyExchangeCode(code, returnedState) {
      const expected = sessionStorage.getItem('spotify_pkce_state');
      if (!expected || expected !== returnedState) throw new Error('PKCE state mismatch');
      const verifier = sessionStorage.getItem('spotify_pkce_verifier');
      if (!verifier) throw new Error('Missing PKCE verifier');
      const body = new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'authorization_code',
        code,
        redirect_uri: SPOTIFY_REDIRECT_URI,
        code_verifier: verifier,
      });
      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body,
      });
      if (!res.ok) throw new Error('Token exchange failed: ' + res.status);
      const d = await res.json();
      sessionStorage.removeItem('spotify_pkce_verifier');
      sessionStorage.removeItem('spotify_pkce_state');
      return {
        access_token: d.access_token,
        refresh_token: d.refresh_token,
        expires_at: Date.now() + d.expires_in * 1000,
      };
    }

    async function spotifyRefresh(refresh_token) {
      const body = new URLSearchParams({
        client_id: SPOTIFY_CLIENT_ID,
        grant_type: 'refresh_token',
        refresh_token,
      });
      const res = await fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body,
      });
      if (!res.ok) throw new Error('Refresh failed: ' + res.status);
      const d = await res.json();
      return {
        access_token: d.access_token,
        refresh_token: d.refresh_token || refresh_token,
        expires_at: Date.now() + d.expires_in * 1000,
      };
    }

    function FocusTracker() {
      const [preset, setPreset] = useState('25/5/10');
      const [customFocus, setCustomFocus] = useState(30);
      const [customShortBreak, setCustomShortBreak] = useState(5);
      const [customLongBreak, setCustomLongBreak] = useState(15);
      const [target, setTarget] = useState(25 * 60);
      const [elapsed, setElapsed] = useState(0);
      const [isRunning, setIsRunning] = useState(false);
      const [taskLabel, setTaskLabel] = useState('');
      const [sessions, setSessions] = useState([]);
      const [soundEnabled, setSoundEnabled] = useState(true);
      const [view, setView] = useState('timer');
      const [block, setBlock] = useState('focus');
      const [focusCount, setFocusCount] = useState(0);
      const [loaded, setLoaded] = useState(false);
      const [soundPrefs, setSoundPrefs] = useState(DEFAULT_SOUND_PREFS);

      const [spotifyTokens, setSpotifyTokens] = useState(null);
      const [spotifyUser, setSpotifyUser] = useState(null);
      const [spotifyPremium, setSpotifyPremium] = useState(null);
      const [spotifyPlaylists, setSpotifyPlaylists] = useState([]);
      const [spotifyConnecting, setSpotifyConnecting] = useState(false);
      const [spotifyError, setSpotifyError] = useState(null);

      const prevElapsedRef = useRef(0);
      const lastTickRef = useRef(0);
      const audioRef = useRef({ ctx: null, buffers: new Map() });
      const playerRef = useRef(null);
      const deviceIdRef = useRef(null);
      const tokensRef = useRef(null);
      const externalPlaybackRef = useRef(false);
      const fadeIntervalRef = useRef(null);
      const fadeFiredRef = useRef(false);
      const musicStartedRef = useRef(false);

      const spotifyConnected = !!spotifyTokens && spotifyPremium === true;
      const startedAtRef = useRef(null);
      const baseElapsedRef = useRef(0);

      const computeElapsed = () =>
        baseElapsedRef.current +
        (startedAtRef.current ? (Date.now() - startedAtRef.current) / 1000 : 0);

      const getMinutesForBlock = useCallback((b) => {
        if (preset === 'custom') {
          if (b === 'focus') return customFocus;
          if (b === 'short_break') return customShortBreak;
          if (b === 'long_break') return customLongBreak;
        }
        const p = PRESETS[preset];
        if (!p) return 25;
        if (b === 'focus') return p.focus;
        if (b === 'short_break') return p.shortBreak;
        if (b === 'long_break') return p.longBreak;
        return 25;
      }, [preset, customFocus, customShortBreak, customLongBreak]);

      useEffect(() => {
        const load = async () => {
          try {
            const s = await window.storage.get('sessions');
            if (s) setSessions(JSON.parse(s.value));
          } catch (e) {}
          try {
            const p = await window.storage.get('preferences');
            if (p) {
              const prefs = JSON.parse(p.value);
              if (prefs.preset && (prefs.preset === 'custom' || PRESETS[prefs.preset])) {
                setPreset(prefs.preset);
              }
              if (typeof prefs.customFocus === 'number') setCustomFocus(prefs.customFocus);
              if (typeof prefs.customShortBreak === 'number') setCustomShortBreak(prefs.customShortBreak);
              if (typeof prefs.customLongBreak === 'number') setCustomLongBreak(prefs.customLongBreak);
              if (typeof prefs.soundEnabled === 'boolean') setSoundEnabled(prefs.soundEnabled);
              if (prefs.soundPrefs && typeof prefs.soundPrefs === 'object') {
                setSoundPrefs({ ...DEFAULT_SOUND_PREFS, ...prefs.soundPrefs });
              }
            }
          } catch (e) {}
          setLoaded(true);
        };
        load();
      }, []);

      useEffect(() => {
        if (!loaded) return;
        window.storage.set('preferences', JSON.stringify({
          preset, customFocus, customShortBreak, customLongBreak, soundEnabled, soundPrefs
        })).catch(() => {});
      }, [preset, customFocus, customShortBreak, customLongBreak, soundEnabled, soundPrefs, loaded]);

      useEffect(() => {
        if (isRunning || elapsed > 0) return;
        setTarget(getMinutesForBlock(block) * 60);
      }, [preset, customFocus, customShortBreak, customLongBreak, block, isRunning, elapsed, getMinutesForBlock]);

      const ensureCtx = () => {
        if (!audioRef.current.ctx) {
          audioRef.current.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        return audioRef.current.ctx;
      };

      const loadBuffer = async (path) => {
        const { buffers } = audioRef.current;
        if (buffers.has(path)) return buffers.get(path);
        const ctx = ensureCtx();
        const arr = await fetch(path).then(r => r.arrayBuffer());
        const buf = await ctx.decodeAudioData(arr);
        buffers.set(path, buf);
        return buf;
      };

      const playPath = useCallback(async (path, gain = 1) => {
        if (!soundEnabled) return;
        try {
          const ctx = ensureCtx();
          if (ctx.state === 'suspended') await ctx.resume();
          const buf = await loadBuffer(path);
          const src = ctx.createBufferSource();
          src.buffer = buf;
          const g = ctx.createGain();
          g.gain.value = gain;
          src.connect(g).connect(ctx.destination);
          src.start();
        } catch (e) {}
      }, [soundEnabled]);

      const playSoundId = useCallback((catalog, id, gain = 1) => {
        const s = catalog.find(x => x.id === id);
        if (s) playPath(s.path, gain);
      }, [playPath]);

      // Keep tokensRef in sync with state for use inside async callbacks
      useEffect(() => { tokensRef.current = spotifyTokens; }, [spotifyTokens]);

      // Persist tokens to localStorage
      useEffect(() => {
        if (spotifyTokens) {
          try { localStorage.setItem('spotifyAuth', JSON.stringify(spotifyTokens)); } catch (e) {}
        } else {
          try { localStorage.removeItem('spotifyAuth'); } catch (e) {}
        }
      }, [spotifyTokens]);

      // Mount: handle OAuth callback ?code=…&state=… OR restore tokens from localStorage
      useEffect(() => {
        const url = new URL(window.location.href);
        const code = url.searchParams.get('code');
        const returnedState = url.searchParams.get('state');
        if (code) {
          setSpotifyConnecting(true);
          spotifyExchangeCode(code, returnedState)
            .then(tokens => {
              setSpotifyTokens(tokens);
              url.searchParams.delete('code');
              url.searchParams.delete('state');
              history.replaceState({}, '', url.pathname + (url.search ? url.search : '') + url.hash);
            })
            .catch(err => {
              setSpotifyError(err.message || 'Auth failed');
              setSpotifyConnecting(false);
              history.replaceState({}, '', url.pathname);
            });
        } else {
          try {
            const stored = localStorage.getItem('spotifyAuth');
            if (stored) setSpotifyTokens(JSON.parse(stored));
          } catch (e) {}
        }
      }, []);

      // Token refresh: schedule a silent refresh ~60s before expiry
      useEffect(() => {
        if (!spotifyTokens) return;
        const ms = Math.max(15_000, spotifyTokens.expires_at - Date.now() - 60_000);
        const id = setTimeout(async () => {
          try {
            const fresh = await spotifyRefresh(spotifyTokens.refresh_token);
            setSpotifyTokens(fresh);
          } catch (e) {
            setSpotifyError('Spotify session expired — reconnect in Settings.');
            setSpotifyTokens(null);
          }
        }, ms);
        return () => clearTimeout(id);
      }, [spotifyTokens]);

      // SDK + Player lifecycle
      useEffect(() => {
        if (!spotifyTokens) {
          if (playerRef.current) {
            try { playerRef.current.disconnect(); } catch (e) {}
            playerRef.current = null;
          }
          deviceIdRef.current = null;
          musicStartedRef.current = false;
          externalPlaybackRef.current = false;
          setSpotifyPremium(null);
          setSpotifyUser(null);
          setSpotifyPlaylists([]);
          return;
        }

        // Fetch profile (premium check) + playlists once per connection
        if (spotifyPremium === null) {
          fetch('https://api.spotify.com/v1/me', { headers: { Authorization: 'Bearer ' + spotifyTokens.access_token } })
            .then(r => r.ok ? r.json() : null)
            .then(u => {
              if (!u) return;
              setSpotifyUser({ name: u.display_name || u.email || 'Spotify user' });
              setSpotifyPremium(u.product === 'premium');
              setSpotifyConnecting(false);
            })
            .catch(() => setSpotifyConnecting(false));

          fetch('https://api.spotify.com/v1/me/playlists?limit=50', { headers: { Authorization: 'Bearer ' + spotifyTokens.access_token } })
            .then(r => r.ok ? r.json() : { items: [] })
            .then(d => setSpotifyPlaylists((d.items || []).map(p => ({ uri: p.uri, name: p.name }))))
            .catch(() => {});
        }

        if (playerRef.current) return;

        const initPlayer = () => {
          if (playerRef.current || !window.Spotify) return;
          const player = new window.Spotify.Player({
            name: 'Focus Tracker',
            getOAuthToken: cb => cb(tokensRef.current?.access_token || ''),
            volume: 1.0,
          });
          player.addListener('ready', ({ device_id }) => { deviceIdRef.current = device_id; });
          player.addListener('not_ready', () => { deviceIdRef.current = null; });
          player.addListener('account_error', () => {
            setSpotifyPremium(false);
            try { player.disconnect(); } catch (e) {}
          });
          player.addListener('initialization_error', ({ message }) => setSpotifyError(message));
          player.addListener('authentication_error', () => {
            setSpotifyError('Spotify auth expired — reconnect.');
            setSpotifyTokens(null);
          });
          player.addListener('player_state_changed', state => {
            if (!state) { externalPlaybackRef.current = true; return; }
            externalPlaybackRef.current = false;
          });
          player.connect();
          playerRef.current = player;
        };

        if (window.Spotify) {
          initPlayer();
        } else {
          window.onSpotifyWebPlaybackSDKReady = initPlayer;
          if (!document.getElementById('spotify-sdk-script')) {
            const s = document.createElement('script');
            s.id = 'spotify-sdk-script';
            s.src = 'https://sdk.scdn.co/spotify-player.js';
            document.head.appendChild(s);
          }
        }
      }, [spotifyTokens, spotifyPremium]);

      // Music controls (no-ops when Spotify is not connected)
      const startMusic = useCallback(async () => {
        if (fadeIntervalRef.current) { clearInterval(fadeIntervalRef.current); fadeIntervalRef.current = null; }
        fadeFiredRef.current = false;
        if (!spotifyConnected || !playerRef.current || !deviceIdRef.current) return;
        try {
          await playerRef.current.setVolume(1.0);
          const uri = soundPrefs.spotifyPlaylistUri || SPOTIFY_DEFAULT_PLAYLIST.uri;
          if (!musicStartedRef.current || externalPlaybackRef.current) {
            const res = await fetch('https://api.spotify.com/v1/me/player/play?device_id=' + deviceIdRef.current, {
              method: 'PUT',
              headers: {
                Authorization: 'Bearer ' + tokensRef.current.access_token,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ context_uri: uri }),
            });
            if (res.ok || res.status === 204) {
              musicStartedRef.current = true;
              externalPlaybackRef.current = false;
            } else if (res.status === 404) {
              setSpotifyError('Spotify playlist could not be played (the default editorial playlist may not be available — pick one of your own in Settings).');
            }
          } else {
            await playerRef.current.resume();
          }
        } catch (e) { /* polite */ }
      }, [spotifyConnected, soundPrefs.spotifyPlaylistUri]);

      const pauseMusic = useCallback(async () => {
        if (fadeIntervalRef.current) { clearInterval(fadeIntervalRef.current); fadeIntervalRef.current = null; }
        if (!spotifyConnected || !playerRef.current || externalPlaybackRef.current) return;
        try { await playerRef.current.pause(); } catch (e) {}
      }, [spotifyConnected]);

      const fadeMusic = useCallback(() => {
        if (!spotifyConnected || !playerRef.current || externalPlaybackRef.current) return;
        if (fadeFiredRef.current) return;
        fadeFiredRef.current = true;
        if (fadeIntervalRef.current) clearInterval(fadeIntervalRef.current);
        const steps = 40, stepMs = 100, targetVol = 0.1;
        playerRef.current.getVolume().then(from => {
          const delta = (targetVol - from) / steps;
          let i = 0;
          fadeIntervalRef.current = setInterval(() => {
            i++;
            if (!playerRef.current) {
              clearInterval(fadeIntervalRef.current); fadeIntervalRef.current = null; return;
            }
            const v = i >= steps ? targetVol : (from + delta * i);
            playerRef.current.setVolume(v).catch(() => {});
            if (i >= steps) { clearInterval(fadeIntervalRef.current); fadeIntervalRef.current = null; }
          }, stepMs);
        }).catch(() => {});
      }, [spotifyConnected]);

      const restoreVolume = useCallback(async () => {
        if (fadeIntervalRef.current) { clearInterval(fadeIntervalRef.current); fadeIntervalRef.current = null; }
        fadeFiredRef.current = false;
        if (!spotifyConnected || !playerRef.current || externalPlaybackRef.current) return;
        try { await playerRef.current.setVolume(1.0); } catch (e) {}
      }, [spotifyConnected]);

      const disconnectSpotify = useCallback(() => {
        setSpotifyTokens(null);
        setSpotifyError(null);
      }, []);

      useEffect(() => {
        if (!isRunning) return;
        const tick = () => setElapsed(Math.floor(computeElapsed()));
        tick();
        const id = setInterval(tick, 250);
        const onVis = () => { if (!document.hidden) tick(); };
        document.addEventListener('visibilitychange', onVis);
        return () => {
          clearInterval(id);
          document.removeEventListener('visibilitychange', onVis);
        };
      }, [isRunning]);

      useEffect(() => {
        if (isRunning && target > 0 && prevElapsedRef.current < target && elapsed >= target) {
          let soundId;
          if (block === 'focus') {
            const nextIsLong = (focusCount + 1) >= 4;
            soundId = nextIsLong ? soundPrefs.longBreakStart : soundPrefs.shortBreakStart;
          } else if (block === 'short_break') {
            soundId = soundPrefs.shortBreakEnd;
          } else {
            soundId = soundPrefs.longBreakEnd;
          }
          if (spotifyConnected) soundId = 'wood-block';
          playSoundId(CHIME_SOUNDS, soundId);
          if (spotifyConnected && block === 'focus') fadeMusic();
        }
        prevElapsedRef.current = elapsed;
      }, [elapsed, target, isRunning, block, focusCount, soundPrefs, playSoundId, spotifyConnected, fadeMusic]);

      useEffect(() => {
        if (!isRunning || !soundPrefs.tickingEnabled || block !== 'focus') {
          lastTickRef.current = elapsed;
          return;
        }
        if (elapsed > 0 && elapsed - lastTickRef.current === 1) {
          playSoundId(TICK_SOUNDS, soundPrefs.tickSound, 0.4);
        }
        lastTickRef.current = elapsed;
      }, [elapsed, isRunning, block, soundPrefs.tickingEnabled, soundPrefs.tickSound, playSoundId]);

      useEffect(() => {
        const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
        const ss = String(elapsed % 60).padStart(2, '0');
        document.title = isRunning ? `${mm}:${ss} · ${BLOCK_LABELS[block]}` : 'Focus';
        return () => { document.title = 'Focus'; };
      }, [elapsed, isRunning, block]);

      const handleStart = () => {
        startedAtRef.current = Date.now();
        setIsRunning(true);
        if (block === 'focus') startMusic();
      };
      const handlePause = () => {
        baseElapsedRef.current = computeElapsed();
        startedAtRef.current = null;
        setIsRunning(false);
        if (block === 'focus') pauseMusic();
      };
      const handleAdd10 = () => {
        setTarget(t => t + 10 * 60);
        if (block === 'focus') restoreVolume();
      };
      const handleDouble = () => {
        setTarget(t => t * 2);
        if (block === 'focus') restoreVolume();
      };

      const handleReset = async () => {
        if (block === 'focus') pauseMusic();
        if (block === 'focus' && elapsed >= 30) {
          const session = {
            id: Date.now(),
            duration: elapsed,
            label: taskLabel.trim() || 'Focus',
            completedAt: new Date().toISOString(),
          };
          const newSessions = [session, ...sessions];
          setSessions(newSessions);
          try {
            await window.storage.set('sessions', JSON.stringify(newSessions));
          } catch (e) {}
        }

        let nextBlock;
        let nextFocusCount = focusCount;
        if (block === 'focus') {
          nextFocusCount = focusCount + 1;
          nextBlock = nextFocusCount >= 4 ? 'long_break' : 'short_break';
        } else if (block === 'short_break') {
          nextBlock = 'focus';
        } else {
          nextBlock = 'focus';
          nextFocusCount = 0;
        }

        setBlock(nextBlock);
        setFocusCount(nextFocusCount);
        setIsRunning(false);
        setElapsed(0);
        prevElapsedRef.current = 0;
        baseElapsedRef.current = 0;
        startedAtRef.current = null;
        setTaskLabel('');
        setTarget(getMinutesForBlock(nextBlock) * 60);
      };

      const formatTime = (s) => {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      };

      const r = 140;
      const circumference = 2 * Math.PI * r;
      const progress = target > 0 ? Math.min(elapsed / target, 1) : 0;
      const offset = circumference * (1 - progress);
      const isOvertime = elapsed > 0 && elapsed >= target;

      const today = new Date().toDateString();
      const todaySessions = sessions.filter(s => new Date(s.completedAt).toDateString() === today);
      const todayMinutes = Math.round(todaySessions.reduce((acc, s) => acc + s.duration, 0) / 60);

      const weekData = Array.from({ length: 7 }, (_, i) => {
        const d = new Date();
        d.setDate(d.getDate() - (6 - i));
        const dateStr = d.toDateString();
        const minutes = sessions
          .filter(s => new Date(s.completedAt).toDateString() === dateStr)
          .reduce((acc, s) => acc + s.duration, 0) / 60;
        return {
          day: d.toLocaleDateString('en-US', { weekday: 'short' })[0],
          minutes: Math.round(minutes),
          isToday: i === 6,
        };
      });
      const maxWeekMinutes = Math.max(...weekData.map(d => d.minutes), 30);

      const blockLabel = BLOCK_LABELS[block];

      return (
        <div className="min-h-screen bg-stone-50 text-stone-800 flex flex-col items-center justify-center p-6">
          <div className="w-full max-w-md">
            <div className="flex justify-between items-center mb-8">
              <div className="flex items-center gap-2">
                <span className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: SAGE }} />
                <h1 className="text-xs font-medium tracking-[0.2em] text-stone-500 uppercase">
                  {view === 'timer' ? blockLabel : view === 'log' ? 'Log' : 'Settings'}
                </h1>
              </div>
              <div className="flex gap-1">
                <button onClick={() => setSoundEnabled(!soundEnabled)}
                  className="p-2 text-stone-400 hover:text-stone-700 transition-colors"
                  aria-label="Toggle sound">
                  {soundEnabled ? <Volume2 size={16} /> : <VolumeX size={16} />}
                </button>
                <button onClick={() => setView('timer')}
                  className={`p-2 transition-colors ${view === 'timer' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-700'}`}
                  aria-label="Timer view">
                  <Timer size={16} />
                </button>
                <button onClick={() => setView('log')}
                  className={`p-2 transition-colors ${view === 'log' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-700'}`}
                  aria-label="Log view">
                  <List size={16} />
                </button>
                <button onClick={() => setView('settings')}
                  className={`p-2 transition-colors ${view === 'settings' ? 'text-stone-800' : 'text-stone-400 hover:text-stone-700'}`}
                  aria-label="Settings view">
                  <Settings size={16} />
                </button>
              </div>
            </div>

            {view === 'timer' ? (
              <>
                <div className="flex justify-center items-center gap-2 mb-6">
                  {[0, 1, 2, 3].map(i => {
                    const completed = i < focusCount;
                    const current = block === 'focus' && i === focusCount;
                    return (
                      <div key={i} className="rounded-full transition-all"
                        style={{
                          width: current ? '10px' : '8px',
                          height: current ? '10px' : '8px',
                          backgroundColor: completed || current ? SAGE : 'transparent',
                          border: `1px solid ${SAGE}`,
                          boxShadow: current ? `0 0 0 3px ${SAGE_SOFT}` : 'none',
                        }} />
                    );
                  })}
                </div>

                <div className="relative flex items-center justify-center mb-10">
                  <svg width="320" height="320" viewBox="0 0 320 320" className="-rotate-90">
                    <circle cx="160" cy="160" r={r} fill="none" stroke="#E7E5E4" strokeWidth="2" />
                    <circle cx="160" cy="160" r={r} fill="none" stroke={SAGE} strokeWidth="2"
                      strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round"
                      style={{ transition: 'stroke-dashoffset 1s linear' }} />
                  </svg>
                  <div className="absolute inset-0 flex flex-col items-center justify-center">
                    <div className="text-6xl font-mono font-light tracking-tighter tabular-nums"
                      style={{ color: isOvertime ? SAGE : STONE_800, transition: 'color 400ms ease' }}>
                      {formatTime(elapsed)}
                    </div>
                    <div className="mt-2 text-xs tracking-wider text-stone-400 tabular-nums">
                      / {formatTime(target)}
                    </div>
                    {taskLabel.trim() && block === 'focus' && (
                      <div className="mt-2 text-xs tracking-wider text-stone-400 uppercase">
                        {taskLabel}
                      </div>
                    )}
                  </div>
                </div>

                {block === 'focus' ? (
                  <div className="mb-8">
                    <input type="text" value={taskLabel}
                      onChange={(e) => setTaskLabel(e.target.value)}
                      placeholder="What are you focusing on?" maxLength={40}
                      className="w-full px-4 py-2 bg-transparent border-b border-stone-200 text-center text-sm text-stone-700 placeholder-stone-300 focus:outline-none focus:border-stone-400 transition-colors" />
                  </div>
                ) : (
                  <div className="mb-8">
                    <div className="w-full px-4 py-2 border-b border-stone-200 text-center text-sm text-stone-500">
                      {block === 'short_break'
                        ? 'Take a little break'
                        : 'Time for a pause, walk a little bit maybe'}
                    </div>
                  </div>
                )}

                <div className="flex justify-center items-center gap-3 mb-10">
                  {!isRunning ? (
                    <button onClick={handleStart}
                      className="w-16 h-16 rounded-full bg-stone-800 text-stone-50 flex items-center justify-center hover:bg-stone-700 active:scale-95 transition-all"
                      aria-label="Start">
                      <Play size={20} fill="currentColor" className="ml-0.5" />
                    </button>
                  ) : (
                    <button onClick={handlePause}
                      className="w-16 h-16 rounded-full bg-stone-800 text-stone-50 flex items-center justify-center hover:bg-stone-700 active:scale-95 transition-all"
                      aria-label="Pause">
                      <Pause size={20} fill="currentColor" />
                    </button>
                  )}
                  <button onClick={handleAdd10}
                    className="w-12 h-12 rounded-full border border-stone-200 text-stone-500 flex items-center justify-center hover:border-stone-400 hover:text-stone-700 transition-colors text-xs font-medium tabular-nums"
                    aria-label="Add 10 minutes">+10</button>
                  <button onClick={handleDouble}
                    className="w-12 h-12 rounded-full border border-stone-200 text-stone-500 flex items-center justify-center hover:border-stone-400 hover:text-stone-700 transition-colors text-xs font-medium"
                    aria-label="Double target">×2</button>
                  <button onClick={handleReset}
                    className="w-12 h-12 rounded-full border border-stone-200 text-stone-500 flex items-center justify-center hover:border-stone-400 hover:text-stone-700 transition-colors"
                    aria-label="Skip to next block">
                    <SkipForward size={14} fill="currentColor" />
                  </button>
                </div>

                {!isRunning && elapsed === 0 && (
                  <>
                    <div className="flex justify-center gap-1 flex-wrap">
                      {Object.keys(PRESETS).map((key) => (
                        <button key={key} onClick={() => setPreset(key)}
                          className={`px-4 py-2 text-xs tracking-wider rounded-full transition-colors ${
                            preset === key ? 'bg-stone-800 text-stone-50' : 'text-stone-500 hover:text-stone-800'
                          }`}>
                          {PRESETS[key].label}
                        </button>
                      ))}
                      <button onClick={() => setPreset('custom')}
                        className={`px-4 py-2 text-xs tracking-wider rounded-full transition-colors ${
                          preset === 'custom' ? 'bg-stone-800 text-stone-50' : 'text-stone-500 hover:text-stone-800'
                        }`}>Custom</button>
                    </div>

                    {preset === 'custom' && (
                      <div className="mt-6 space-y-2 max-w-xs mx-auto">
                        {[
                          { label: 'Focus', value: customFocus, setter: setCustomFocus },
                          { label: 'Short break', value: customShortBreak, setter: setCustomShortBreak },
                          { label: 'Long break', value: customLongBreak, setter: setCustomLongBreak },
                        ].map(({ label, value, setter }) => (
                          <div key={label} className="flex justify-between items-center py-1">
                            <span className="text-xs tracking-wider text-stone-500 uppercase">{label}</span>
                            <div className="flex items-center gap-2">
                              <input type="number" min="1" max="180" value={value}
                                onChange={(e) => setter(Math.max(1, Math.min(180, parseInt(e.target.value) || 1)))}
                                className="w-14 px-2 py-1 text-center border-b border-stone-200 bg-transparent tabular-nums focus:outline-none focus:border-stone-400 text-sm" />
                              <span className="text-xs text-stone-400">min</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </>
                )}
              </>
            ) : view === 'log' ? (
              <div className="space-y-10">
                <div className="text-center">
                  <div className="text-6xl font-mono font-light tabular-nums text-stone-800">
                    {todayMinutes}<span className="text-2xl text-stone-300 ml-2">m</span>
                  </div>
                  <div className="text-xs tracking-[0.2em] text-stone-400 uppercase mt-3">
                    Today · {todaySessions.length} session{todaySessions.length !== 1 ? 's' : ''}
                  </div>
                </div>

                <div>
                  <div className="text-xs tracking-[0.2em] text-stone-400 uppercase mb-4">Last 7 days</div>
                  <div className="flex justify-between items-end h-28 gap-2">
                    {weekData.map((d, i) => (
                      <div key={i} className="flex-1 flex flex-col items-center gap-2 h-full">
                        <div className="flex-1 w-full flex items-end">
                          <div className="w-full rounded-sm transition-all"
                            style={{
                              height: `${(d.minutes / maxWeekMinutes) * 100}%`,
                              minHeight: d.minutes > 0 ? '3px' : '0',
                              backgroundColor: d.isToday ? SAGE : '#D6D3D1'
                            }} />
                        </div>
                        <div className={`text-xs ${d.isToday ? 'text-stone-700 font-medium' : 'text-stone-400'}`}>
                          {d.day}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div>
                  <div className="text-xs tracking-[0.2em] text-stone-400 uppercase mb-2">Sessions</div>
                  {todaySessions.length > 0 ? (
                    <div>
                      {todaySessions.map((s) => (
                        <div key={s.id} className="flex items-center justify-between py-3 border-b border-stone-100">
                          <div className="text-sm text-stone-700 truncate pr-4">{s.label}</div>
                          <div className="flex items-center gap-4 shrink-0">
                            <div className="text-xs text-stone-400 tabular-nums">
                              {new Date(s.completedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                            </div>
                            <div className="text-sm text-stone-500 tabular-nums w-10 text-right">
                              {Math.round(s.duration / 60)}m
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="text-center text-sm text-stone-400 py-8">No sessions yet today.</div>
                  )}
                </div>
              </div>
            ) : (
              <div className="space-y-8">
                <div>
                  <div className="flex items-baseline justify-between mb-4">
                    <div className="text-xs tracking-[0.2em] text-stone-400 uppercase">Spotify</div>
                    <div className="text-[10px] tracking-wider text-stone-400 uppercase">Premium required</div>
                  </div>

                  {spotifyError && (
                    <div className="mb-3 text-xs text-red-600 bg-red-50 border border-red-100 rounded px-3 py-2">
                      {spotifyError}
                      <button onClick={() => setSpotifyError(null)} className="ml-2 underline">Dismiss</button>
                    </div>
                  )}

                  {!spotifyTokens && !spotifyConnecting && (
                    <button onClick={() => spotifyBeginAuth()}
                      className="w-full py-2 border border-stone-300 rounded text-sm text-stone-700 hover:border-stone-500 hover:text-stone-900 transition-colors tracking-wider uppercase text-xs">
                      Connect Spotify →
                    </button>
                  )}

                  {spotifyConnecting && (
                    <div className="text-sm text-stone-500 py-2">Connecting…</div>
                  )}

                  {spotifyTokens && spotifyPremium === false && (
                    <div className="space-y-2 py-2">
                      <div className="text-sm text-stone-700">Spotify Premium is required.</div>
                      <div className="text-xs text-stone-500">Your account doesn't have Premium. Disconnect and try with a Premium account.</div>
                      <button onClick={disconnectSpotify}
                        className="text-xs tracking-wider text-stone-400 hover:text-stone-700 uppercase px-2 py-1 transition-colors">
                        Disconnect
                      </button>
                    </div>
                  )}

                  {spotifyTokens && spotifyPremium === true && (
                    <div className="space-y-3">
                      <div className="flex items-center justify-between py-2 border-b border-stone-100">
                        <span className="text-sm text-stone-600 truncate pr-2">Connected as {spotifyUser?.name || '…'}</span>
                        <button onClick={disconnectSpotify}
                          className="text-xs tracking-wider text-stone-400 hover:text-stone-700 uppercase px-2 py-1 transition-colors shrink-0">
                          Disconnect
                        </button>
                      </div>
                      <div className="flex items-center justify-between py-2 border-b border-stone-100">
                        <span className="text-sm text-stone-600">Playlist</span>
                        <select value={soundPrefs.spotifyPlaylistUri}
                          onChange={(e) => setSoundPrefs({ ...soundPrefs, spotifyPlaylistUri: e.target.value })}
                          className="bg-transparent border-b border-stone-200 text-sm text-stone-700 py-1 pr-2 focus:outline-none focus:border-stone-400 max-w-[220px]">
                          <option value={SPOTIFY_DEFAULT_PLAYLIST.uri}>{SPOTIFY_DEFAULT_PLAYLIST.name}</option>
                          {spotifyPlaylists.map(p => (
                            <option key={p.uri} value={p.uri}>{p.name}</option>
                          ))}
                        </select>
                      </div>
                    </div>
                  )}
                </div>

                <div>
                  <div className="flex items-baseline justify-between mb-4">
                    <div className="text-xs tracking-[0.2em] text-stone-400 uppercase">Sounds</div>
                    <div className="text-[10px] tracking-wider text-stone-400 normal-case">used when Spotify is not connected</div>
                  </div>
                  {[
                    { key: 'shortBreakStart', label: 'Short break start' },
                    { key: 'shortBreakEnd',   label: 'Short break end' },
                    { key: 'longBreakStart',  label: 'Long break start' },
                    { key: 'longBreakEnd',    label: 'Long break end' },
                  ].map(({ key, label }) => (
                    <div key={key} className="flex items-center justify-between py-2 border-b border-stone-100">
                      <span className="text-sm text-stone-600">{label}</span>
                      <div className="flex items-center gap-2">
                        <select value={soundPrefs[key]}
                          onChange={(e) => setSoundPrefs({ ...soundPrefs, [key]: e.target.value })}
                          className="bg-transparent border-b border-stone-200 text-sm text-stone-700 py-1 pr-2 focus:outline-none focus:border-stone-400">
                          {CHIME_SOUNDS.map(s => (
                            <option key={s.id} value={s.id}>{s.label}</option>
                          ))}
                        </select>
                        <button onClick={() => playSoundId(CHIME_SOUNDS, soundPrefs[key])}
                          className="text-xs tracking-wider text-stone-400 hover:text-stone-700 uppercase px-2 py-1 transition-colors"
                          aria-label={`Test ${label} sound`}>
                          Test
                        </button>
                      </div>
                    </div>
                  ))}
                </div>

                <div>
                  <div className="flex items-baseline justify-between mb-4">
                    <div className="text-xs tracking-[0.2em] text-stone-400 uppercase">Ticking</div>
                    <div className="text-[10px] tracking-wider text-stone-400 normal-case">used when Spotify is not connected</div>
                  </div>
                  <div className="flex items-center justify-between py-2 border-b border-stone-100">
                    <span className="text-sm text-stone-600">Tick every second (focus only)</span>
                    <button onClick={() => setSoundPrefs({ ...soundPrefs, tickingEnabled: !soundPrefs.tickingEnabled })}
                      className="relative w-10 h-5 rounded-full transition-colors"
                      style={{ backgroundColor: soundPrefs.tickingEnabled ? SAGE : '#D6D3D1' }}
                      aria-label="Toggle ticking">
                      <span className="absolute top-0.5 w-4 h-4 rounded-full bg-white shadow-sm transition-all"
                        style={{ left: soundPrefs.tickingEnabled ? '22px' : '2px' }} />
                    </button>
                  </div>
                  <div className={`flex items-center justify-between py-2 border-b border-stone-100 transition-opacity ${soundPrefs.tickingEnabled ? '' : 'opacity-40 pointer-events-none'}`}>
                    <span className="text-sm text-stone-600">Tick sound</span>
                    <div className="flex items-center gap-2">
                      <select value={soundPrefs.tickSound}
                        onChange={(e) => setSoundPrefs({ ...soundPrefs, tickSound: e.target.value })}
                        disabled={!soundPrefs.tickingEnabled}
                        className="bg-transparent border-b border-stone-200 text-sm text-stone-700 py-1 pr-2 focus:outline-none focus:border-stone-400 disabled:cursor-not-allowed">
                        {TICK_SOUNDS.map(s => (
                          <option key={s.id} value={s.id}>{s.label}</option>
                        ))}
                      </select>
                      <button onClick={() => playSoundId(TICK_SOUNDS, soundPrefs.tickSound, 0.4)}
                        disabled={!soundPrefs.tickingEnabled}
                        className="text-xs tracking-wider text-stone-400 hover:text-stone-700 uppercase px-2 py-1 transition-colors disabled:cursor-not-allowed"
                        aria-label="Test tick sound">
                        Test
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<FocusTracker />);
  </script>
</body>
</html>
